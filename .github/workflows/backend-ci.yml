name: Spring Boot CI

# This triggers the test every time someone pushes to main or makes a Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # This enters your backend folder and tests if the Java code compiles
      run: |
        cd backend
        mvn clean install -DskipTests